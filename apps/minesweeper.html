<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Сапёр PRO — Неоновый</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800;900&display=swap');

  *{box-sizing:border-box;margin:0;padding:0; user-select:none; touch-action:none;}
  :root{
    --bg:#050508;--cell:#1a1a24;--cell-open:#0d0d14;--cell-hover:#22222f;
    --border:#2c2c40;--text:#f0f0f8;--text2:#8888aa;
    --accent:#5b8cff;--mine:#ff4466;--flag:#ff8c42;--success:#00e5a0;--gold:#ffd700;
  }
  body{
    background:var(--bg);color:var(--text);
    font-family:'JetBrains Mono',monospace;
    display:flex;flex-direction:column;align-items:center;
    height:100dvh;overflow:hidden;
  }

  #game-wrapper{
    position:relative; width:100%; max-width:420px; height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:10px 8px;
  }

  /* Scanlines */
  #game-wrapper::after{
    content:" ";display:block;position:absolute;inset:0;
    background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.15) 50%);
    z-index:5;background-size:100% 3px;pointer-events:none;mix-blend-mode:overlay;opacity:0.2;
  }

  /* Top bar */
  #top-bar{
    display:flex;justify-content:space-between;align-items:center;
    width:100%;padding:4px 4px 10px;z-index:10;position:relative;
  }
  #diff-row{display:flex;gap:4px;}
  .dbtn{
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    color:var(--text2);padding:5px 9px;border-radius:6px;font-family:inherit;
    font-size:.6rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.05em;
  }
  .dbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(91,140,255,0.1);}
  .dbtn:hover{border-color:var(--accent);}

  #stats{display:flex;gap:14px;font-size:.7rem;color:var(--text2);align-items:center;}
  #stats span{display:flex;align-items:center;gap:3px;}
  .stat-val{font-weight:700;color:var(--text);font-size:.85rem;}

  /* Smiley button */
  #smiley{
    width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);font-size:1.2rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .2s;
  }
  #smiley:hover{border-color:var(--accent);background:rgba(91,140,255,0.1);}
  #smiley:active{transform:scale(.9);}

  /* Grid */
  #grid{
    display:inline-grid;gap:2px;
    background:rgba(17,17,24,0.8);border-radius:10px;padding:6px;
    border:1px solid rgba(255,255,255,0.05);
    position:relative;z-index:10;
  }
  .cell{
    display:flex;align-items:center;justify-content:center;
    border-radius:4px;cursor:pointer;font-weight:700;
    transition:background .1s, transform .15s;
    aspect-ratio:1;position:relative;overflow:hidden;
  }
  .cell.hidden{
    background:var(--cell);border:1px solid var(--border);
  }
  .cell.hidden:hover{background:var(--cell-hover);border-color:rgba(91,140,255,0.3);}
  .cell.hidden:active{transform:scale(.92);}
  .cell.flagged{
    background:rgba(255,140,66,0.12);border:1px solid var(--flag);
    animation:flagPop .25s ease;
  }
  @keyframes flagPop{0%{transform:scale(.8);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
  .cell.open{background:var(--cell-open);cursor:default;border:1px solid rgba(255,255,255,0.03);}
  .cell.mine{background:var(--mine);animation:mineReveal .4s ease;}
  @keyframes mineReveal{0%{transform:scale(0);opacity:0;}50%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
  .cell.wrong-flag{background:rgba(255,68,102,0.2);border:1px solid var(--mine);}

  /* Number colors */
  .n1{color:#5b8cff}.n2{color:#00e5a0}.n3{color:#ff4466}.n4{color:#b05bff}
  .n5{color:#ff8c42}.n6{color:#00c8ff}.n7{color:#f0f0f8}.n8{color:#8888aa}

  /* Hint highlight */
  .cell.hint{
    animation:hintPulse 1s ease infinite;
    border-color:var(--gold)!important;
  }
  @keyframes hintPulse{0%,100%{box-shadow:0 0 5px rgba(255,215,0,0.3);}50%{box-shadow:0 0 15px rgba(255,215,0,0.6);}}

  /* Bottom controls */
  #bottom-bar{
    display:flex;justify-content:center;gap:10px;margin-top:10px;
    position:relative;z-index:10;
  }
  .ctrl-btn{
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
    color:var(--text2);padding:7px 14px;border-radius:8px;font-family:inherit;
    font-size:.65rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;
  }
  .ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}
  .ctrl-btn:active{transform:scale(.95);}

  /* Overlay */
  #overlay{
    position:absolute;inset:0;background:rgba(5,5,8,0.9);backdrop-filter:blur(6px);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    z-index:50;gap:10px;border-radius:12px;
  }
  #overlay.show{display:flex;}
  #overlay h2{font-size:1.5rem;}
  #overlay p{font-size:.75rem;color:var(--text2);text-align:center;}
  #overlay .btn-play{
    background:var(--accent);color:#000;border:none;padding:10px 28px;border-radius:10px;
    font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;
  }
  #overlay .stats-row{display:flex;gap:16px;margin:6px 0;}
  #overlay .stat-box{text-align:center;}
  #overlay .stat-box .sv{font-size:1.3rem;font-weight:900;color:var(--gold);}
  #overlay .stat-box .sl{font-size:.5rem;color:var(--text2);text-transform:uppercase;}

  /* Progress bar for mine detection */
  #mine-progress{
    width:100%;height:3px;background:rgba(255,255,255,0.04);border-radius:2px;
    margin-top:8px;overflow:hidden;position:relative;z-index:10;
  }
  #mine-progress-fill{
    height:100%;width:0%;background:linear-gradient(90deg,var(--success),var(--accent));
    box-shadow:0 0 8px var(--success);transition:width .3s ease;
  }

  /* Hint text */
  #hint{
    font-size:.55rem;color:rgba(255,255,255,0.2);text-align:center;
    margin-top:6px;position:relative;z-index:10;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="top-bar">
    <div id="diff-row">
      <button class="dbtn on" data-r="9" data-c="9" data-m="10">9×9</button>
      <button class="dbtn" data-r="12" data-c="10" data-m="20">12×10</button>
      <button class="dbtn" data-r="14" data-c="12" data-m="35">14×12</button>
    </div>
    <div id="stats">
      <span>💣 <span class="stat-val" id="mcount">10</span></span>
      <span>⏱ <span class="stat-val" id="timer">0</span></span>
    </div>
    <button id="smiley" title="Новая игра">😊</button>
  </div>

  <div id="grid"></div>

  <div id="mine-progress"><div id="mine-progress-fill"></div></div>

  <div id="bottom-bar">
    <button class="ctrl-btn" id="btn-hint">💡 Подсказка</button>
    <button class="ctrl-btn" id="btn-undo">↩️ Отмена</button>
  </div>

  <div id="hint">Клик = открыть · Долгое нажатие = флаг 🚩 · Двойной клик = авто-открытие</div>

  <div id="overlay">
    <h2 id="o-title"></h2>
    <p id="o-sub"></p>
    <div class="stats-row" id="o-stats"></div>
    <button class="btn-play" id="o-btn">Играть снова</button>
  </div>
</div>

<script>
/**
 * AUDIO ENGINE
 */
const AudioSys = {
  ctx: null,
  init(){ if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==='suspended') this.ctx.resume(); },
  tone(f,t,d,v=.5,s=null){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=t;o.connect(g);g.connect(this.ctx.destination);
    const n=this.ctx.currentTime;
    o.frequency.setValueAtTime(f,n);
    if(s) o.frequency.exponentialRampToValueAtTime(s,n+d);
    g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.01,n+d);
    o.start(n);o.stop(n+d);
  },
  noise(d,v=.3){
    if(!this.ctx) return;
    const sz=this.ctx.sampleRate*d,buf=this.ctx.createBuffer(1,sz,this.ctx.sampleRate);
    const dt=buf.getChannelData(0);for(let i=0;i<sz;i++) dt[i]=Math.random()*2-1;
    const src=this.ctx.createBufferSource();src.buffer=buf;
    const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=600;
    const g=this.ctx.createGain();g.gain.setValueAtTime(v,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,this.ctx.currentTime+d);
    src.connect(f);f.connect(g);g.connect(this.ctx.destination);src.start();
  },
  sfx:{
    open:()=>AudioSys.tone(400,'sine',.05,.15),
    flag:()=>AudioSys.tone(300,'triangle',.08,.2),
    unflag:()=>AudioSys.tone(250,'triangle',.06,.15),
    explode:()=>{AudioSys.noise(.5,.4);AudioSys.tone(100,'sawtooth',.5,.3,30);},
    win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>AudioSys.tone(f,'square',.15,.2),i*100));},
    chord:()=>AudioSys.tone(500,'sine',.06,.15,700),
  }
};

/**
 * GAME ENGINE
 */
let ROWS=9,COLS=9,MINES=10;
let board,revealed,flagged,minePos,first,over,sec,tid,flags,hintsLeft=3;
let undoStack=[]; // For undo: {i, wasFlagged, wasRevealed}
let bestTimes=JSON.parse(localStorage.getItem('mines_best')||'{}');
let gamesPlayed=+localStorage.getItem('mines_played')||0;
let gamesWon=+localStorage.getItem('mines_won')||0;

function $(id){return document.getElementById(id);}

function newGame(){
  board=Array(ROWS*COLS).fill(0);
  revealed=Array(ROWS*COLS).fill(false);
  flagged=Array(ROWS*COLS).fill(false);
  minePos=new Set(); first=true; over=false; flags=0; sec=0; hintsLeft=3; undoStack=[];
  $('mcount').textContent=MINES;
  $('timer').textContent='0';
  $('smiley').textContent='😊';
  $('mine-progress-fill').style.width='0%';
  $('overlay').classList.remove('show');
  clearInterval(tid);
  renderGrid();
}

function placeMines(safeIdx){
  minePos.clear();
  // Protect 3x3 area around first click
  const safe=new Set([safeidx]);
  const sr=Math.floor(safeidx/COLS),sc=safeidx%COLS;
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const nr=sr+dr,nc=sc+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) safe.add(nr*COLS+nc);
  }
  while(minePos.size<MINES){
    const i=Math.floor(Math.random()*ROWS*COLS);
    if(!safe.has(i)) minePos.add(i);
  }
  minePos.forEach(i=>board[i]=-1);
  for(let i=0;i<ROWS*COLS;i++){
    if(board[i]===-1) continue;
    board[i]=neighbors(i).filter(n=>minePos.has(n)).length;
  }
}

function neighbors(i){
  const r=Math.floor(i/COLS),c=i%COLS,ns=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc) continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) ns.push(nr*COLS+nc);
  }
  return ns;
}

function reveal(i){
  if(revealed[i]||flagged[i]) return;
  revealed[i]=true;
  undoStack.push({i,type:'reveal'});
  if(board[i]===0) neighbors(i).forEach(n=>reveal(n));
}

function openCell(i){
  if(over||revealed[i]) return;
  // If flagged, do nothing on click
  if(flagged[i]) return;

  if(first){
    first=false;
    placeMines(i);
    AudioSys.init();
    tid=setInterval(()=>{sec++;$('timer').textContent=sec;},1000);
  }

  if(board[i]===-1){
    revealed[i]=true;
    gameOver(false); return;
  }

  reveal(i);
  AudioSys.sfx.open();
  renderGrid();
  if(checkWin()) gameOver(true);
}

function chord(i){
  // Double-click / chord: if cell is revealed and is a number, auto-reveal neighbors
  if(!revealed[i]||board[i]<=0) return;
  const nb=neighbors(i);
  const adjFlags=nb.filter(n=>flagged[n]).length;
  if(adjFlags===board[i]){
    AudioSys.sfx.chord();
    let hitMine=false;
    nb.forEach(n=>{
      if(!revealed[n]&&!flagged[n]){
        if(board[n]===-1){
          revealed[n]=true;hitMine=true;
        } else {
          reveal(n);
        }
      }
    });
    renderGrid();
    if(hitMine) gameOver(false);
    else if(checkWin()) gameOver(true);
  }
}

function toggleFlag(i){
  if(over||revealed[i]) return;
  const prev=flagged[i];
  flagged[i]=!flagged[i];
  flags+=flagged[i]?1:-1;
  undoStack.push({i,type:'flag',prev});
  $('mcount').textContent=MINES-flags;
  AudioSys.sfx[flagged[i]?'flag':'unflag']();
  renderGrid();
}

function doHint(){
  if(over||hintsLeft<=0) return;
  // Find an unrevealed, unflagged safe cell
  const safeCells=[];
  for(let i=0;i<ROWS*COLS;i++){
    if(!revealed[i]&&!flagged[i]&&board[i]!==-1) safeCells.push(i);
  }
  if(safeCells.length===0) return;

  hintsLeft--;
  // Prefer cells adjacent to revealed numbers
  const adjCells=safeCells.filter(i=>neighbors(i).some(n=>revealed[n]));
  const pool=adjCells.length>0?adjCells:safeCells;
  const hintIdx=pool[Math.floor(Math.random()*pool.length)];

  const cells=$('grid').children;
  if(cells[hintIdx]){
    cells[hintIdx].classList.add('hint');
    setTimeout(()=>cells[hintIdx]?.classList.remove('hint'),3000);
  }
  $('btn-hint').textContent=`💡 ${hintsLeft}`;
}

function doUndo(){
  if(undoStack.length===0||over) return;
  const action=undoStack.pop();
  if(action.type==='flag'){
    flagged[action.i]=action.prev;
    flags=flagged.filter((f,i)=>f).length;
    $('mcount').textContent=MINES-flags;
  } else if(action.type==='reveal'){
    // Can't undo reveals easily, so just skip
    doUndo();
  }
  renderGrid();
}

function checkWin(){
  for(let i=0;i<ROWS*COLS;i++){
    if(!minePos.has(i)&&!revealed[i]) return false;
  }
  return true;
}

function gameOver(win){
  over=true;clearInterval(tid);
  $('smiley').textContent=win?'😎':'😵';

  if(!win){
    AudioSys.sfx.explode();
    // Show all mines
    minePos.forEach(i=>{
      if(!flagged[i]) revealed[i]=true;
    });
    // Show wrong flags
    for(let i=0;i<ROWS*COLS;i++){
      if(flagged[i]&&!minePos.has(i)){
        // Mark wrong flag
      }
    }
  } else {
    AudioSys.sfx.win();
    // Auto-flag remaining mines
    minePos.forEach(i=>{if(!flagged[i]) flagged[i]=true;});
    flags=minePos.size;
    $('mcount').textContent='0';
  }

  renderGrid(win);

  // Stats
  gamesPlayed++;
  if(win) gamesWon++;
  localStorage.setItem('mines_played',gamesPlayed);
  localStorage.setItem('mines_won',gamesWon);

  const key=`${ROWS}x${COLS}x${MINES}`;
  const isNewBest=win&&(!bestTimes[key]||sec<bestTimes[key]);
  if(isNewBest){bestTimes[key]=sec;localStorage.setItem('mines_best',JSON.stringify(bestTimes));}

  setTimeout(()=>{
    $('o-title').textContent=win?'🎉 Очищено!':'💥 Взрыв!';
    $('o-title').style.color=win?'var(--success)':'var(--mine)';

    let statsHtml=`
      <div class="stat-box"><div class="sv">${sec}</div><div class="sl">Секунд</div></div>
      <div class="stat-box"><div class="sv">${gamesWon}/${gamesPlayed}</div><div class="sl">Побед</div></div>
    `;
    if(isNewBest) statsHtml+=`<div class="stat-box"><div class="sv">⭐</div><div class="sl">Новый рекорд!</div></div>`;
    if(bestTimes[key]) statsHtml+=`<div class="stat-box"><div class="sv">${bestTimes[key]}с</div><div class="sl">Лучшее</div></div>`;
    $('o-stats').innerHTML=statsHtml;

    $('o-btn').textContent=win?'Следующая игра':'Попробовать снова';
    $('overlay').classList.add('show');
  }, win?300:800);
}

function renderGrid(won=false){
  const g=$('grid');
  g.style.gridTemplateColumns=`repeat(${COLS},1fr)`;

  // Cell size
  const maxW=Math.min(window.innerWidth-32, 400);
  const cellSize=Math.min(36, Math.floor((maxW-12-COLS*2)/COLS));

  g.innerHTML='';
  for(let i=0;i<ROWS*COLS;i++){
    const d=document.createElement('div');
    d.style.width=d.style.height=cellSize+'px';
    d.style.fontSize=Math.max(11,cellSize*.5)+'px';

    if(revealed[i]){
      if(board[i]===-1){
        d.className='cell mine';
        d.textContent=flagged[i]?'🚩':'💣';
      } else {
        d.className='cell open'+(board[i]>0?` n${board[i]}`:'');
        d.textContent=board[i]||'';
      }
      if(won&&board[i]===-1&&!flagged[i]) d.classList.add('safe');
    } else if(flagged[i]){
      d.className='cell flagged';
      d.textContent='🚩';
      // Wrong flag on game over
      if(over&&!minePos.has(i)) d.classList.add('wrong-flag');
    } else {
      d.className='cell hidden';
    }

    // Interaction
    let pt;
    d.addEventListener('touchstart',e=>{
      pt=setTimeout(()=>{toggleFlag(i);pt=null;},400);
    },{passive:true});
    d.addEventListener('touchmove',()=>{clearTimeout(pt);pt=null;},{passive:true});
    d.addEventListener('touchend',e=>{
      e.preventDefault();
      if(pt){clearTimeout(pt);pt=null;openCell(i);}
    });

    d.addEventListener('click',()=>openCell(i));
    d.addEventListener('dblclick',()=>chord(i));
    d.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(i);});

    g.appendChild(d);
  }

  // Update progress
  const totalSafe=ROWS*COLS-MINES;
  const revealedSafe=Array.from({length:ROWS*COLS},(_,i)=>i).filter(i=>revealed[i]&&!minePos.has(i)).length;
  $('mine-progress-fill').style.width=(totalSafe>0?(revealedSafe/totalSafe*100):0)+'%';
}

// Difficulty buttons
document.querySelectorAll('.dbtn').forEach(b=>b.addEventListener('click',()=>{
  ROWS=+b.dataset.r;COLS=+b.dataset.c;MINES=+b.dataset.m;
  document.querySelectorAll('.dbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  newGame();
}));

$('smiley').onclick=()=>newGame();
$('o-btn').onclick=()=>newGame();
$('btn-hint').onclick=()=>doHint();
$('btn-undo').onclick=()=>doUndo();

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.code==='KeyR') newGame();
  if(e.code==='KeyH') doHint();
});

newGame();
</script>
</body>
</html>
