<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>2048</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0f;--sur:#1a1a24;--sur2:#22222f;--text:#f0f0f8;--text2:#8888aa;--tile-bg:#22222f;--accent:#00e5a0}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;user-select:none;padding-top:10px;transition:background .3s,--text .3s}
  
  /* Темы */
  body.theme-classic{--bg:#faf8ef;--sur:#bbada0;--sur2:#cdc1b4;--text:#776e65;--text2:#999;--tile-bg:#cdc1b4}
  body.theme-dark{--bg:#1e1e2e;--sur:#313244;--sur2:#45475a;--text:#cdd6f4;--text2:#a6adc8;--tile-bg:#45475a}
  body.theme-sunset{--bg:#2d1b4e;--sur:#53386d;--sur2:#6b4c7a;--text:#f5e6ff;--text2:#c9a8ff;--tile-bg:#6b4c7a}
  body.theme-ocean{--bg:#0a1628;--sur:#1a3a5c;--sur2:#264a6c;--text:#e0f0ff;--text2:#a0c0e0;--tile-bg:#264a6c}
  body.theme-matrix{--bg:#001000;--sur:#003000;--sur2:#004000;--text:#00ff00;--text2:#00cc00;--tile-bg:#004000}
  
  #hdr{display:flex;justify-content:space-between;align-items:center;width:min(92vw,340px);margin-bottom:10px}
  #title{font-size:1.6rem;font-weight:700}
  .sc-box{background:var(--sur);border-radius:8px;padding:4px 14px;text-align:center;min-width:60px}
  .sc-lbl{font-size:.55rem;color:var(--text2);letter-spacing:.1em}
  .sc-val{font-size:1rem;font-weight:700}
  
  #controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
  .ctrl-btn{background:var(--sur);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:6px 12px;border-radius:6px;font-size:.7rem;cursor:pointer;font-family:inherit;transition:all .2s}
  .ctrl-btn:hover{background:var(--sur2)}
  .ctrl-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
  
  #grid{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--sur);border-radius:12px;padding:10px;width:min(92vw,340px);aspect-ratio:1}
  .tile{position:absolute;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:transform .15s ease-out,opacity .15s;will-change:transform}
  .tile-merge{animation:pop .2s ease-out}
  @keyframes pop{0%{transform:scale(.8)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
  .tile-new{animation:appear .2s ease-out}
  @keyframes appear{0%{opacity:0;transform:scale(0)}100%{opacity:1;transform:scale(1)}}
  
  /* Цвета плиток для всех тем */
  .v2{background:#eee4da;color:#776e65}
  .v4{background:#ede0c8;color:#776e65}
  .v8{background:#f2b179;color:#fff}
  .v16{background:#f59563;color:#fff}
  .v32{background:#f67c5f;color:#fff}
  .v64{background:#f65e3b;color:#fff}
  .v128{background:#edcf72;color:#fff;font-size:1.3rem}
  .v256{background:#edcc61;color:#fff;font-size:1.3rem}
  .v512{background:#edc850;color:#fff;font-size:1.3rem}
  .v1024{background:#edc53f;color:#fff;font-size:1.1rem}
  .v2048{background:#edc22e;color:#fff;font-size:1.1rem}
  .vsuper{background:#3c3a32;color:#fff;font-size:.9rem}
  
  body.theme-matrix .v2{background:#005000;color:#00ff00}
  body.theme-matrix .v4{background:#006000;color:#00ff00}
  body.theme-matrix .v8{background:#007000;color:#00ff00}
  body.theme-matrix .v16{background:#008000;color:#00ff00}
  body.theme-matrix .v32{background:#009000;color:#00ff00}
  body.theme-matrix .v64{background:#00a000;color:#00ff00}
  body.theme-matrix .v128{background:#00b000;color:#00ff00}
  body.theme-matrix .v256{background:#00c000;color:#00ff00}
  body.theme-matrix .v512{background:#00d000;color:#00ff00}
  body.theme-matrix .v1024{background:#00e000;color:#00ff00}
  body.theme-matrix .v2048{background:#00ff00;color:#000}
  
  #msg{position:fixed;inset:0;background:rgba(10,10,15,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:1.2rem;font-weight:700;z-index:100}
  #msg p{font-size:.8rem;color:var(--text2)}
  #btn-r{background:var(--accent);color:#000;border:none;padding:11px 32px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit}
  #btn-new{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--text2);padding:7px 18px;border-radius:8px;font-family:inherit;font-size:.75rem;cursor:pointer;margin-top:8px}
</style>
</head>
<body class="theme-dark">
<div id="hdr">
  <div id="title">2048</div>
  <div style="display:flex;gap:8px">
    <div class="sc-box"><div class="sc-lbl">СЧЁТ</div><div class="sc-val" id="score">0</div></div>
    <div class="sc-box"><div class="sc-lbl">РЕКОРД</div><div class="sc-val" id="best">0</div></div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" data-theme="theme-classic">☀️ Классика</button>
  <button class="ctrl-btn active" data-theme="theme-dark">🌙 Тёмная</button>
  <button class="ctrl-btn" data-theme="theme-sunset">🌅 Закат</button>
  <button class="ctrl-btn" data-theme="theme-ocean">🌊 Океан</button>
  <button class="ctrl-btn" data-theme="theme-matrix">💻 Матрица</button>
</div>

<div id="grid"></div>
<button id="btn-new">Новая игра</button>

<div id="msg">
  <div id="msg-text">🎉 2048!</div>
  <p id="msg-sub"></p>
  <button id="btn-r">Ещё раз</button>
</div>

<script>
let board,score,best=+localStorage.getItem('2048_best')||0,over=false,moving=false,won=false;
const gridEl=document.getElementById('grid');
const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best');
const msg=document.getElementById('msg');
const CELL_SIZE = 70;
const GAP = 8;
const GRID_PADDING = 10;

// Применение темы
document.querySelectorAll('[data-theme]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-theme]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.body.className = btn.dataset.theme;
    localStorage.setItem('2048_theme', btn.dataset.theme);
    render();
  });
});

// Загрузка сохранённой темы
const savedTheme = localStorage.getItem('2048_theme') || 'theme-dark';
document.body.classList.add(savedTheme);
document.querySelector(`[data-theme="${savedTheme}"]`)?.classList.add('active');

bestEl.textContent=best;

function newGame(){
  board=Array(16).fill(0); score=0; over=false; moving=false; won=false;
  scoreEl.textContent=0; msg.style.display='none';
  gridEl.innerHTML='';
  addTile(); addTile(); render();
}

function addTile(){
  const empty=board.map((v,i)=>v===0?i:-1).filter(i=>i>=0);
  if(!empty.length) return;
  const i=empty[Math.floor(Math.random()*empty.length)];
  board[i]=Math.random()<0.9?2:4;
  return i;
}

function getPos(index){
  const row = Math.floor(index / 4);
  const col = index % 4;
  return {
    x: GRID_PADDING + col * (CELL_SIZE + GAP),
    y: GRID_PADDING + row * (CELL_SIZE + GAP)
  };
}

function getClassForValue(v){
  if(v===0) return '';
  if(v<=2048) return `v${v}`;
  return 'vsuper';
}

function render(){
  // Очищаем и пересоздаём плитки с анимацией
  const tiles = gridEl.querySelectorAll('.tile');
  tiles.forEach(t=>t.remove());
  
  board.forEach((v,i)=>{
    if(v===0) return;
    const tile = document.createElement('div');
    tile.className = `tile ${getClassForValue(v)} tile-new`;
    tile.textContent = v;
    const pos = getPos(i);
    tile.style.left = pos.x + 'px';
    tile.style.top = pos.y + 'px';
    tile.style.width = CELL_SIZE + 'px';
    tile.style.height = CELL_SIZE + 'px';
    tile.dataset.index = i;
    gridEl.appendChild(tile);
  });
}

function slide(row){
  let arr=row.filter(v=>v);
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]){
      arr[i]*=2; score+=arr[i]; arr.splice(i+1,1);
    }
  }
  while(arr.length<4) arr.push(0);
  return arr;
}

function move(dir){
  if(over || moving) return;
  const prev=board.slice();
  
  for(let i=0;i<4;i++){
    let row, indices;
    if(dir==='l'){ 
      row=board.slice(i*4,i*4+4);
      indices = [i*4, i*4+1, i*4+2, i*4+3];
    }
    else if(dir==='r'){ 
      row=board.slice(i*4,i*4+4).reverse();
      indices = [i*4+3, i*4+2, i*4+1, i*4];
    }
    else if(dir==='u'){ 
      row=[board[i],board[i+4],board[i+8],board[i+12]];
      indices = [i, i+4, i+8, i+12];
    }
    else {
      row=[board[i+12],board[i+8],board[i+4],board[i]];
      indices = [i+12, i+8, i+4, i];
    }

    const slid = slide(row);
    for(let j=0;j<4;j++) board[indices[j]]=slid[j];
  }

  const changed=board.some((v,i)=>v!==prev[i]);
  if(changed){
    moving = true;
    scoreEl.textContent=score;
    if(score>best){ best=score; bestEl.textContent=best; localStorage.setItem('2048_best',best); }
    
    render();
    
    setTimeout(()=>{
      addTile();
      render();
      moving = false;
      
      if(board.includes(2048)&&!won){ showMsg('🎉 2048!','Продолжай!'); won=true; submitScore(); return; }
      if(!canMove()){ showMsg('😞 Игра окончена',`Счёт: ${score}`); over=true; submitScore(); }
    }, 150);
  }
}

function canMove(){
  if(board.includes(0)) return true;
  for(let i=0;i<4;i++) for(let j=0;j<3;j++){
    if(board[i*4+j]===board[i*4+j+1]) return true;
    if(board[j*4+i]===board[(j+1)*4+i]) return true;
  }
  return false;
}

function submitScore(){
  try {
    const api = window.parent?.PlatformAPI;
    if (api) {
      const xp = Math.max(1, Math.floor(score / 100));
      api.gameplay.submitScore('2048', score, xp).catch(()=>{});
    }
  } catch {}
}

function showMsg(t,s){ document.getElementById('msg-text').textContent=t; document.getElementById('msg-sub').textContent=s; msg.style.display='flex'; }

document.getElementById('btn-new').addEventListener('click',newGame);
document.getElementById('btn-r').addEventListener('click',newGame);

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'l',ArrowRight:'r',ArrowUp:'u',ArrowDown:'d'};
  if(map[e.key]){ e.preventDefault(); move(map[e.key]); }
});

let tx,ty;
document.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'r':'l');
  else move(dy>0?'d':'u');
},{passive:true});

newGame();
</script>
</body>
</html>
