<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Русский Бильярд: Свободная Пирамида PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; background-color: #05080a; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; user-select: none; -webkit-user-select: none;}
        
        /* Стол занимает максимум места, но UI плавает поверх */
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 1; padding: max(2vh, 10px); }
        canvas { touch-action: none; box-shadow: 0 40px 100px rgba(0,0,0,1); border-radius: 1vw; max-width: 100%; max-height: 100%; aspect-ratio: 2/1; object-fit: contain; cursor: crosshair; }
        
        /* UI Elements */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .ui-panel { pointer-events: auto; background: rgba(10, 15, 20, 0.75); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Шкала силы (Лево) */
        .power-track { position: relative; width: 36px; height: 35vh; min-height: 200px; background: rgba(0,0,0,0.8); border-radius: 18px; border: 2px solid #2a3f54; box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); overflow: hidden; touch-action: none; }
        .power-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #ef4444, #eab308, #22c55e); border-radius: 16px; transition: height 0.05s; pointer-events: none; }
        .power-handle { position: absolute; left: 50%; transform: translate(-50%, 50%); width: 48px; height: 12px; background: #fff; border-radius: 6px; box-shadow: 0 0 10px rgba(255,255,255,0.5); pointer-events: none; z-index: 2; }
        .power-overlay { position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 10%, rgba(255,255,255,0.05) 10%, rgba(255,255,255,0.05) 11%); pointer-events: none; }

        /* Микро-прицел (Низ) */
        .micro-aim-track { position: relative; width: 40vw; min-width: 250px; height: 40px; background: rgba(0,0,0,0.8); border-radius: 8px; border: 1px solid #2a3f54; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; cursor: ew-resize; }
        .micro-aim-ruler { width: 200%; height: 100%; background: repeating-linear-gradient(to right, rgba(255,255,255,0.2) 0, rgba(255,255,255,0.2) 2px, transparent 2px, transparent 20px); transition: transform 0.1s linear; pointer-events: none; }
        .micro-aim-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #10b981; box-shadow: 0 0 8px #10b981; pointer-events: none; transform: translateX(-50%); }

        /* Винт (Право) */
        #spin-control { background: radial-gradient(circle, #e2e8f0 0%, #94a3b8 100%); box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4), inset 2px 2px 5px rgba(255,255,255,0.8), 0 5px 15px rgba(0,0,0,0.6); }
        #spin-dot { transition: transform 0.1s; }
        
        .ball-icon { width: 22px; height: 22px; border-radius: 50%; background: #fffff0; color: black; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: inset -3px -3px 5px rgba(0,0,0,0.4); }
        .ball-empty { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <!-- СТОЛ (Холст на заднем плане) -->
    <div id="game-container">
        <canvas id="billiardCanvas"></canvas>
    </div>

    <!-- UI СЛОЙ (Парит над столом) -->
    <div id="ui-layer">
        
        <!-- ШАПКА И СЧЕТ -->
        <header class="w-full flex justify-between items-start p-4 md:p-6">
            <div class="ui-panel rounded-2xl px-6 py-3 flex items-center gap-6">
                <!-- Игрок 1 -->
                <div id="player1-panel" class="flex flex-col items-center gap-1 transition-all duration-300">
                    <span class="text-[10px] md:text-xs uppercase font-bold tracking-widest text-emerald-400" id="name1">Игрок 1</span>
                    <div id="pocketed1" class="flex gap-1"></div>
                </div>
                <div class="w-px h-8 bg-white/20"></div>
                <!-- Игрок 2 -->
                <div id="player2-panel" class="flex flex-col items-center gap-1 transition-all duration-300 opacity-50">
                    <span class="text-[10px] md:text-xs uppercase font-bold tracking-widest text-white" id="name2">Игрок 2</span>
                    <div id="pocketed2" class="flex gap-1"></div>
                </div>
            </div>

            <!-- Статус и Настройки -->
            <div class="flex flex-col items-end gap-2">
                <div id="game-status" class="ui-panel px-4 py-2 rounded-full text-xs font-bold text-emerald-400 tracking-wide">
                    Выберите шар
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleTheme()" class="ui-panel px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-colors text-white">Темы</button>
                    <button onclick="toggleNumbers()" class="ui-panel px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-colors text-white" id="btn-numbers">Номера: ВКЛ</button>
                    <div class="ui-panel flex items-center gap-2 px-4 py-2 rounded-full cursor-pointer hover:bg-white/10 transition-colors">
                        <input type="checkbox" id="full-trajectory-cb" class="w-4 h-4 accent-emerald-500 cursor-pointer pointer-events-none">
                        <label for="full-trajectory-cb" class="text-[10px] font-bold uppercase tracking-widest cursor-pointer select-none text-white">Траектория</label>
                    </div>
                </div>
            </div>
        </header>

        <!-- ЦЕНТРАЛЬНАЯ ОСЬ С ЭЛЕМЕНТАМИ УПРАВЛЕНИЯ -->
        <div class="flex-1 flex justify-between items-center px-4 md:px-8">
            
            <!-- ЛЕВО: Сила удара -->
            <div class="ui-panel p-4 rounded-[2rem] flex flex-col items-center gap-3">
                <span class="text-[10px] font-bold uppercase tracking-widest text-red-400">Сила</span>
                <div id="power-slider" class="power-track cursor-ns-resize">
                    <div class="power-overlay"></div>
                    <div id="power-fill" class="power-fill" style="height: 0%;"></div>
                    <div id="power-handle" class="power-handle" style="bottom: 100%;"></div>
                </div>
                <span class="text-[9px] text-gray-400 uppercase">Тяни вниз</span>
            </div>

            <!-- ПРАВО: Винт -->
            <div class="ui-panel p-4 rounded-[2rem] flex flex-col items-center gap-3">
                <span class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Винт</span>
                <div id="spin-control" class="relative w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-gray-800 cursor-crosshair touch-none">
                    <div class="absolute top-1/2 left-0 w-full h-px bg-black/30"></div>
                    <div class="absolute top-0 left-1/2 w-px h-full bg-black/30"></div>
                    <div id="spin-dot" class="absolute top-1/2 left-1/2 w-4 h-4 bg-red-600 rounded-full border-[3px] border-white shadow-md -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
                </div>
                <button onclick="resetSpin()" class="text-[9px] uppercase font-bold bg-white/10 hover:bg-white/20 px-4 py-1.5 rounded-full transition-colors w-full text-white border border-gray-600">Сброс</button>
            </div>
        </div>

        <!-- ПОДВАЛ: Микро-прицел -->
        <footer class="w-full flex justify-center pb-6 md:pb-8">
            <div class="ui-panel p-3 px-6 rounded-2xl flex flex-col items-center gap-2">
                <span class="text-[10px] font-bold uppercase tracking-widest text-emerald-400">Микро-прицел (Угол)</span>
                <div id="micro-aim-area" class="micro-aim-track">
                    <div id="micro-aim-ruler" class="micro-aim-ruler"></div>
                    <div class="micro-aim-center"></div>
                </div>
                <span class="text-[9px] text-gray-400 uppercase tracking-widest">Свайп влево / вправо для точной наводки (ММ)</span>
            </div>
        </footer>
    </div>

    <!-- Модальные окна -->
    <div id="modal-message" class="absolute inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md transition-opacity duration-300 opacity-0 pointer-events-none">
        <div class="ui-panel p-8 rounded-3xl text-center shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <h2 id="modal-title" class="text-3xl md:text-4xl font-black text-white mb-3">Заголовок</h2>
            <p id="modal-desc" class="text-gray-300 mb-8 text-sm md:text-lg max-w-md mx-auto">Описание события</p>
            <button onclick="closeModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-3 rounded-full font-bold text-lg transition-colors pointer-events-auto shadow-lg shadow-emerald-900/50">Продолжить</button>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ ===
        const themes = [
            { name: "Classic Green", cloth: "#105a22", cushion: "#0b3d16", jaw: "#07240d" },
            { name: "Tournament Blue", cloth: "#1e3a8a", cushion: "#1e40af", jaw: "#1e3a8a" }, // tailwind blue-900/800
            { name: "Royal Burgundy", cloth: "#7f1d1d", cushion: "#991b1b", jaw: "#7f1d1d" }, // tailwind red-900/800
            { name: "Graphite Black", cloth: "#1f2937", cushion: "#334155", jaw: "#1e293b" }, // tailwind gray-800/700/800
            { name: "Coffee Brown", cloth: "#78350f", cushion: "#92400e", jaw: "#713f12" }  // tailwind amber-900/800/900
        ];
        let currentThemeIndex = 0;
        let showNumbers = true;

        function toggleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
        }

        function toggleNumbers() {
            showNumbers = !showNumbers;
            document.getElementById('btn-numbers').innerText = `Номера: ${showNumbers ? 'ВКЛ' : 'ВЫКЛ'}`;
        }

        // === ВЕКТОРНАЯ МАТЕМАТИКА ===
        class Vec2 {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
            mult(n) { return new Vec2(this.x * n, this.y * n); }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            norm() { let m = this.mag(); return m === 0 ? new Vec2(0,0) : new Vec2(this.x/m, this.y/m); }
            dot(v) { return this.x * v.x + this.y * v.y; }
            copy() { return new Vec2(this.x, this.y); }
        }

        // === АУДИО ДВИЖОК ===
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type, intensity) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (intensity < 10) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            let vol = Math.min(intensity / 5000, 1.0);
            
            if (type === 'hit') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800 + Math.random()*200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                filter.type = 'highpass'; filter.frequency.value = 500;
                gainNode.gain.setValueAtTime(vol, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'cushion') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                filter.type = 'lowpass'; filter.frequency.value = 400;
                gainNode.gain.setValueAtTime(vol * 0.8, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'pocket') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'cue') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                filter.type = 'lowpass'; filter.frequency.value = 800;
                gainNode.gain.setValueAtTime(vol, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        // === СТАНДАРТЫ РУССКОГО БИЛЬЯРДА (ММ) ===
        const TABLE_W = 3550; const TABLE_H = 1775; const RAIL_W = 180;   
        const BALL_R = 34;    const BALL_MASS = 0.290; 
        const CORNER_OP = 72; const MIDDLE_OP = 82; const JAW_R = 5;      
        const HOUSE_X = TABLE_W * 0.25; 
        const PHYSICS_STEPS = 10; const MIN_VELOCITY = 5; const MAX_POWER = 6000; const FRICTION = 300; 

        const canvas = document.getElementById('billiardCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let scale = 1; 
        
        let balls = []; let pockets = []; let jaws = []; 

        let gameState = {
            currentPlayer: 1, score1: 0, score2: 0,
            pocketed1: [], pocketed2: [], 
            selectedBall: null,           
            aimAngle: 0, aimPower: 0,
            ballsMoving: false, turnValid: false, 
            spin: new Vec2(0, 0),
            ballInHand: false, hitOccurred: false, foul: false, pocketedThisTurn: 0       
        };

        function darkenColor(hex, percent) {
            let num = parseInt(hex.replace("#", ""), 16), amt = Math.round(2.55 * percent),
                R = (num >> 16) - amt, B = (num >> 8 & 0x00FF) - amt, G = (num & 0x0000FF) - amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (B<255?B<1?0:B:255)*0x100 + (G<255?G<1?0:G:255)).toString(16).slice(1);
        }

        // === КЛАССЫ СИМУЛЯЦИИ ===
        class Jaw { constructor(x, y) { this.pos = new Vec2(x, y); this.r = JAW_R; } }
        class Pocket { constructor(x, y, isMiddle) { this.pos = new Vec2(x, y); this.r = isMiddle ? 45 : 42; this.isMiddle = isMiddle; } }

        class Ball {
            constructor(x, y, color, number = 0) {
                this.number = number;
                this.pos = new Vec2(x, y);
                this.vel = new Vec2(0, 0); this.spin = new Vec2(0, 0); this.sideSpin = 0;               
                this.radius = BALL_R; this.mass = BALL_MASS; this.color = color; this.active = true;
            }

            draw() {
                if (!this.active) return;
                
                // Тень шара
                ctx.beginPath(); ctx.arc(this.pos.x + 8, this.pos.y + 8, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fill();

                // Тело шара
                ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(this.pos.x - this.radius*0.3, this.pos.y - this.radius*0.3, this.radius*0.1, this.pos.x, this.pos.y, this.radius);
                grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.35, this.color); grad.addColorStop(1, darkenColor(this.color, 60));
                ctx.fillStyle = grad; ctx.fill();

                if (this.number > 0 && showNumbers) {
                    ctx.fillStyle = '#111'; ctx.font = `bold ${this.radius * 1.1}px Arial`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.pos.x, this.pos.y + 2);
                }

                // Блик
                ctx.beginPath(); ctx.arc(this.pos.x - this.radius*0.35, this.pos.y - this.radius*0.35, this.radius*0.25, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();

                if (gameState.selectedBall === this) {
                    ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, this.radius + 6, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(16, 185, 129, 1)'; ctx.lineWidth = 3; ctx.setLineDash([8, 6]); ctx.stroke(); ctx.setLineDash([]);
                }
            }
        }

        // === ИНИЦИАЛИЗАЦИЯ И РЕЗСАЙЗ ===
        let cOff = (CORNER_OP + 2*JAW_R) / Math.SQRT2 - JAW_R; 
        let mOff = (MIDDLE_OP + 2*JAW_R) / 2; 

        function resize() {
            let container = document.getElementById('game-container');
            let availW = container.clientWidth; let availH = container.clientHeight;
            
            // Вписываем 2:1
            let ratio = (TABLE_W + RAIL_W*2) / (TABLE_H + RAIL_W*2);
            let canvasW, canvasH;
            if (availW / availH > ratio) { canvasH = availH; canvasW = availH * ratio; } 
            else { canvasW = availW; canvasH = availW / ratio; }

            canvas.style.width = canvasW + 'px'; canvas.style.height = canvasH + 'px';
            canvas.width = TABLE_W + RAIL_W*2; canvas.height = TABLE_H + RAIL_W*2; // Внутреннее разрешение холста фиксировано
            
            scale = canvas.clientWidth / (TABLE_W + RAIL_W*2); // Для перевода кликов мыши
            
            ctx.setTransform(1, 0, 0, 1, 0, 0); // Рисуем 1:1 в виртуальных ММ

            jaws = [
                new Jaw(cOff, -JAW_R), new Jaw(-JAW_R, cOff),
                new Jaw(TABLE_W/2 - mOff, -JAW_R), new Jaw(TABLE_W/2 + mOff, -JAW_R),
                new Jaw(TABLE_W - cOff, -JAW_R), new Jaw(TABLE_W + JAW_R, cOff),
                new Jaw(cOff, TABLE_H + JAW_R), new Jaw(-JAW_R, TABLE_H - cOff),
                new Jaw(TABLE_W/2 - mOff, TABLE_H + JAW_R), new Jaw(TABLE_W/2 + mOff, TABLE_H + JAW_R),
                new Jaw(TABLE_W - cOff, TABLE_H + JAW_R), new Jaw(TABLE_W + JAW_R, TABLE_H - cOff)
            ];

            pockets = [
                new Pocket(-20, -20, false), new Pocket(TABLE_W/2, -30, true), new Pocket(TABLE_W+20, -20, false),
                new Pocket(-20, TABLE_H+20, false), new Pocket(TABLE_W/2, TABLE_H+30, true), new Pocket(TABLE_W+20, TABLE_H+20, false)
            ];
        }

        function initGame() {
            resize(); balls = [];
            gameState.score1 = 0; gameState.score2 = 0;
            gameState.pocketed1 = []; gameState.pocketed2 = [];
            gameState.currentPlayer = 1; gameState.ballInHand = false; gameState.aimAngle = 0;

            let startBall = new Ball(HOUSE_X * 0.8, TABLE_H / 2, '#facc15', 0);
            balls.push(startBall);

            const startX = TABLE_W * 0.72; const startY = TABLE_H / 2;
            let idCounter = 1;

            for (let row = 0; row < 5; row++) {
                for (let col = 0; col <= row; col++) {
                    const bx = startX + row * (BALL_R * Math.sqrt(3) + 0.1);
                    const by = startY - (row * BALL_R) + (col * (BALL_R * 2 + 0.1));
                    balls.push(new Ball(bx, by, '#fffff0', idCounter++));
                }
            }
            
            gameState.selectedBall = startBall;
            updateHUD(); setStatus("Выберите шар для удара.");
        }

        // === ФИЗИКА ===
        function resolveCollisions() {
            for (let i = 0; i < balls.length; i++) {
                if (!balls[i].active) continue;
                for (let j = i + 1; j < balls.length; j++) {
                    if (!balls[j].active) continue;
                    let a = balls[i]; let b = balls[j];
                    let delta = b.pos.sub(a.pos); let dist = delta.mag(); let minDist = a.radius + b.radius;

                    if (dist < minDist) {
                        let overlap = minDist - dist; let normal = delta.norm();
                        a.pos = a.pos.sub(normal.mult(overlap / 2)); b.pos = b.pos.add(normal.mult(overlap / 2));
                        let relVel = a.vel.sub(b.vel); let speed = relVel.dot(normal);
                        if (speed > 0) {
                            if (a === gameState.selectedBall || b === gameState.selectedBall) gameState.hitOccurred = true; 
                            playSound('hit', speed);
                            let impulse = (1.96) * speed / (1/a.mass + 1/b.mass);
                            a.vel = a.vel.sub(normal.mult(impulse / a.mass)); b.vel = b.vel.add(normal.mult(impulse / b.mass));
                            let tangent = new Vec2(-normal.y, normal.x); let relTangentVel = relVel.dot(tangent);
                            let throwImpulse = relTangentVel * 0.03; 
                            a.vel = a.vel.sub(tangent.mult(throwImpulse)); b.vel = b.vel.add(tangent.mult(throwImpulse));
                        }
                    }
                }
            }

            for (let b of balls) {
                if (!b.active) continue;
                for (let jaw of jaws) {
                    let delta = b.pos.sub(jaw.pos); let dist = delta.mag(); let minDist = b.radius + jaw.r;
                    if (dist < minDist) {
                        b.pos = b.pos.add(delta.norm().mult(minDist - dist)); 
                        let speed = b.vel.dot(delta.norm());
                        if (speed < 0) { b.vel = b.vel.sub(delta.norm().mult(speed * 1.6)); playSound('cushion', Math.abs(speed)); }
                    }
                }
            }
        }

        function updatePhysics(dt) {
            let moving = false;
            for (let b of balls) {
                if (!b.active) continue;
                let slip = b.spin.sub(b.vel); let slipMag = slip.mag();

                if (b.vel.mag() > MIN_VELOCITY || slipMag > MIN_VELOCITY || Math.abs(b.sideSpin) > MIN_VELOCITY) {
                    moving = true;
                    if (slipMag > 10) { let fric = slip.mult(5.0 * dt); b.vel = b.vel.add(fric); b.spin = b.spin.sub(fric.mult(2.5)); }
                    b.pos = b.pos.add(b.vel.mult(dt)); 
                    let speed = b.vel.mag();
                    if (speed > 0) { let drop = FRICTION * dt; let mult = Math.max(0, speed - drop) / speed; b.vel = b.vel.mult(mult); b.spin = b.spin.mult(mult); }
                    b.sideSpin *= (1 - 0.5 * dt);

                    let e_cushion = 0.8; let r = b.radius;
                    if (b.pos.y - r < 0) {
                        if (!((b.pos.x < cOff) || (Math.abs(b.pos.x - TABLE_W/2) < mOff) || (b.pos.x > TABLE_W - cOff))) { 
                            b.pos.y = r; b.vel.y *= -e_cushion; b.spin.y *= -e_cushion; b.vel.x -= b.sideSpin * 0.2; b.sideSpin *= 0.5; playSound('cushion', Math.abs(b.vel.y)); 
                        }
                    }
                    if (b.pos.y + r > TABLE_H) {
                        if (!((b.pos.x < cOff) || (Math.abs(b.pos.x - TABLE_W/2) < mOff) || (b.pos.x > TABLE_W - cOff))) { 
                            b.pos.y = TABLE_H - r; b.vel.y *= -e_cushion; b.spin.y *= -e_cushion; b.vel.x += b.sideSpin * 0.2; b.sideSpin *= 0.5; playSound('cushion', Math.abs(b.vel.y)); 
                        }
                    }
                    if (b.pos.x - r < 0) {
                        if (!((b.pos.y < cOff) || (b.pos.y > TABLE_H - cOff))) { 
                            b.pos.x = r; b.vel.x *= -e_cushion; b.spin.x *= -e_cushion; b.vel.y += b.sideSpin * 0.2; b.sideSpin *= 0.5; playSound('cushion', Math.abs(b.vel.x)); 
                        }
                    }
                    if (b.pos.x + r > TABLE_W) {
                        if (!((b.pos.y < cOff) || (b.pos.y > TABLE_H - cOff))) { 
                            b.pos.x = TABLE_W - r; b.vel.x *= -e_cushion; b.spin.x *= -e_cushion; b.vel.y -= b.sideSpin * 0.2; b.sideSpin *= 0.5; playSound('cushion', Math.abs(b.vel.x)); 
                        }
                    }
                } else { b.vel = new Vec2(0, 0); b.spin = new Vec2(0, 0); b.sideSpin = 0; }
            }

            resolveCollisions();

            for (let b of balls) {
                if (!b.active) continue;
                for (let p of pockets) {
                    if (b.pos.sub(p.pos).mag() < p.r) {
                        playSound('pocket', 5000); b.active = false; b.vel = new Vec2(0,0); b.spin = new Vec2(0,0); handlePocketedBall(b); break;
                    }
                }
            }

            if (gameState.ballsMoving && !moving) { gameState.ballsMoving = false; onTurnEnd(); } 
            else if (moving) { gameState.ballsMoving = true; setStatus("Шары в движении..."); }
        }

        function handlePocketedBall(ball) {
            gameState.turnValid = true; gameState.pocketedThisTurn++;
            if (ball === gameState.selectedBall) gameState.selectedBall = null; 
            let symbol = ball.number > 0 ? ball.number : "Б"; 
            if (gameState.currentPlayer === 1) { gameState.score1++; gameState.pocketed1.push(symbol); } 
            else { gameState.score2++; gameState.pocketed2.push(symbol); }
            updateHUD();
            if (gameState.score1 >= 8 || gameState.score2 >= 8) { let winner = gameState.score1 >= 8 ? 1 : 2; showModal("ПОБЕДА!", `Игрок ${winner} первым забил 8 шаров!`, initGame); }
        }

        function onTurnEnd() {
            if (!gameState.hitOccurred && gameState.pocketedThisTurn === 0) {
                gameState.foul = true;
                if (gameState.currentPlayer === 1) { gameState.score2++; gameState.pocketed2.push("Ш"); } 
                else { gameState.score1++; gameState.pocketed1.push("Ш"); }
                showModal("ФОЛ: Промах!", "Ваш шар никого не коснулся. Соперник получает штрафное очко.");
            }
            if (!gameState.turnValid || gameState.foul) gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            gameState.turnValid = false; gameState.foul = false; gameState.hitOccurred = false; gameState.pocketedThisTurn = 0;
            
            let activeBalls = balls.filter(b => b.active);
            if (!gameState.selectedBall || !gameState.selectedBall.active) gameState.selectedBall = activeBalls.length > 0 ? activeBalls[0] : null;
            updateHUD(); setStatus(`Ход Игрока ${gameState.currentPlayer}.`); resetSpin();
        }

        function castRay(start, dir, radius, ignoreBall) {
            let pos = start.copy(); let dist = 0; let result = { hitBall: null, hitPocket: null, hitCushion: false, hitJaw: false, endPos: pos, dir: dir.copy() };
            let maxDist = TABLE_W * 1.5; let step = 5;
            while(dist < maxDist) {
                pos = pos.add(dir.mult(step)); dist += step;
                let jawHit = false;
                for (let jaw of jaws) { if (pos.sub(jaw.pos).mag() < radius + jaw.r) { jawHit = true; break; } }
                if (jawHit) {
                    result.hitCushion = true; result.hitJaw = true; 
                    let backDir = dir.mult(-1); for(let i=0; i<5; i++) pos = pos.add(backDir.mult(1));
                    result.endPos = pos; return result;
                }
                if (pos.x < radius || pos.x > TABLE_W - radius || pos.y < radius || pos.y > TABLE_H - radius) {
                    let inGap = false;
                    if(pos.y < radius && (pos.x < cOff || Math.abs(pos.x - TABLE_W/2) < mOff || pos.x > TABLE_W - cOff)) inGap = true;
                    if(pos.y > TABLE_H-radius && (pos.x < cOff || Math.abs(pos.x - TABLE_W/2) < mOff || pos.x > TABLE_W - cOff)) inGap = true;
                    if(pos.x < radius && (pos.y < cOff || pos.y > TABLE_H - cOff)) inGap = true;
                    if(pos.x > TABLE_W-radius && (pos.y < cOff || pos.y > TABLE_H - cOff)) inGap = true;
                    if (!inGap) { result.hitCushion = true; result.endPos = pos; return result; }
                }
                for (let p of pockets) { if (pos.sub(p.pos).mag() < p.r) { result.hitPocket = p; result.endPos = pos; return result; } }
                for (let b of balls) {
                    if (!b.active || b === ignoreBall) continue;
                    if (pos.sub(b.pos).mag() < radius * 2) {
                        result.hitBall = b; let backDir = dir.mult(-1);
                        while(pos.sub(b.pos).mag() < radius * 2) pos = pos.add(backDir.mult(1));
                        result.endPos = pos; return result;
                    }
                }
            }
            result.endPos = pos; return result;
        }

        // === РЕНДЕР СТОЛА ===
        function drawTable() {
            ctx.save(); ctx.translate(RAIL_W, RAIL_W);
            
            let tTheme = themes[currentThemeIndex];

            // Деревянный каркас (Борта)
            let woodGrad = ctx.createLinearGradient(0, -RAIL_W, 0, TABLE_H+RAIL_W);
            woodGrad.addColorStop(0, '#2e1810'); woodGrad.addColorStop(0.5, '#4a2b1f'); woodGrad.addColorStop(1, '#2e1810');
            ctx.fillStyle = woodGrad;
            ctx.fillRect(-RAIL_W, -RAIL_W, TABLE_W + RAIL_W*2, TABLE_H + RAIL_W*2); 

            // Сукно (Динамическое)
            ctx.fillStyle = tTheme.cloth; ctx.fillRect(0, 0, TABLE_W, TABLE_H);

            // Резина бортов (Динамическая)
            ctx.fillStyle = tTheme.cushion;
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(cOff, 0); ctx.lineTo(0, cOff); ctx.fill(); // TL
            ctx.fillRect(TABLE_W/2 - mOff, -RAIL_W, MIDDLE_OP, RAIL_W); // TM
            ctx.beginPath(); ctx.moveTo(TABLE_W,0); ctx.lineTo(TABLE_W - cOff, 0); ctx.lineTo(TABLE_W, cOff); ctx.fill(); // TR
            ctx.beginPath(); ctx.moveTo(0,TABLE_H); ctx.lineTo(cOff, TABLE_H); ctx.lineTo(0, TABLE_H - cOff); ctx.fill(); // BL
            ctx.fillRect(TABLE_W/2 - mOff, TABLE_H, MIDDLE_OP, RAIL_W); // BM
            ctx.beginPath(); ctx.moveTo(TABLE_W,TABLE_H); ctx.lineTo(TABLE_W - cOff, TABLE_H); ctx.lineTo(TABLE_W, TABLE_H - cOff); ctx.fill(); // BR

            // Сетки (кожаные ремешки)
            ctx.fillStyle = '#050a06';
            pockets.forEach(p => { 
                ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.r, 0, Math.PI * 2); ctx.fill(); 
                // Сетка
                ctx.strokeStyle = '#4a2b1f'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.r * 0.8, 0, Math.PI * 2); ctx.stroke();
            });

            // Латунные скобы (Brass Pockets)
            let brassGrad = ctx.createRadialGradient(0,0,10,0,0,50);
            brassGrad.addColorStop(0, '#facc15'); brassGrad.addColorStop(1, '#a16207');
            pockets.forEach(p => {
                ctx.save(); ctx.translate(p.pos.x, p.pos.y);
                ctx.beginPath(); ctx.arc(0, 0, p.r + 20, Math.PI, 0); // Полукруг
                ctx.strokeStyle = brassGrad; ctx.lineWidth = 15; ctx.lineCap = 'round';
                if(p.pos.y > 0) ctx.rotate(Math.PI);
                if(p.pos.x > 0 && p.pos.x < TABLE_W && p.pos.y < 0) ctx.rotate(Math.PI); // Top middle fix
                ctx.stroke(); ctx.restore();
            });

            // Губки (Динамические)
            ctx.fillStyle = tTheme.jaw;
            jaws.forEach(j => { ctx.beginPath(); ctx.arc(j.pos.x, j.pos.y, j.r*1.5, 0, Math.PI * 2); ctx.fill(); }); 

            // Линия дома
            ctx.beginPath(); ctx.arc(TABLE_W/2, TABLE_H/2, 5, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();
            ctx.beginPath(); ctx.moveTo(HOUSE_X, 0); ctx.lineTo(HOUSE_X, TABLE_H); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 3; ctx.stroke();
            ctx.restore();
        }

        function drawAim() {
            if (gameState.ballsMoving || !gameState.selectedBall) return;
            let isFull = document.getElementById('full-trajectory-cb').checked;
            let tb = gameState.selectedBall;
            let dir = new Vec2(Math.cos(gameState.aimAngle), Math.sin(gameState.aimAngle));
            let cueRay = castRay(tb.pos, dir, BALL_R, tb);
            
            let isGreen = false; let targetRay = null; let cueBounceRay = null;
            if (cueRay.hitPocket) isGreen = true;
            if (cueRay.hitBall) {
                let hitNorm = cueRay.hitBall.pos.sub(cueRay.endPos).norm();
                targetRay = castRay(cueRay.hitBall.pos, hitNorm, BALL_R, cueRay.hitBall);
                if (targetRay.hitPocket) isGreen = true; 
                let cueTangent = new Vec2(-hitNorm.y, hitNorm.x);
                let cuePathDir = (dir.dot(cueTangent) > 0) ? cueTangent : cueTangent.mult(-1);
                if (gameState.spin.y !== 0) cuePathDir = cuePathDir.add(dir.mult(-gameState.spin.y * 0.5)).norm();
                cueBounceRay = castRay(cueRay.endPos, cuePathDir, BALL_R, cueRay.hitBall);
                if (cueBounceRay.hitPocket) isGreen = true; 
            }

            ctx.save(); ctx.translate(RAIL_W, RAIL_W);
            let mainColor = isGreen ? 'rgba(34, 197, 94, 0.9)' : 'rgba(255, 255, 255, 0.7)';
            let secColor = isGreen ? 'rgba(34, 197, 94, 0.6)' : 'rgba(255, 255, 255, 0.4)';
            let targetColor = isGreen ? 'rgba(34, 197, 94, 0.9)' : 'rgba(239, 68, 68, 0.8)';
            if (cueRay.hitJaw && !isGreen) mainColor = 'rgba(239, 68, 68, 0.8)';

            ctx.beginPath(); ctx.moveTo(tb.pos.x, tb.pos.y); ctx.lineTo(cueRay.endPos.x, cueRay.endPos.y);
            ctx.strokeStyle = mainColor; ctx.lineWidth = 4; ctx.setLineDash([15, 15]); ctx.stroke(); ctx.setLineDash([]);
            ctx.beginPath(); ctx.arc(cueRay.endPos.x, cueRay.endPos.y, BALL_R, 0, Math.PI*2); ctx.strokeStyle = mainColor; ctx.lineWidth = 2; ctx.stroke();

            if (cueRay.hitBall) {
                let showFull = isFull || isGreen;
                let tEnd = targetRay.endPos;
                if (targetRay.hitJaw && !isGreen) targetColor = 'rgba(239, 68, 68, 0.8)';
                if (!showFull) { if (tEnd.sub(cueRay.hitBall.pos).mag() > 300) tEnd = cueRay.hitBall.pos.add(targetRay.dir.mult(300)); }
                ctx.beginPath(); ctx.moveTo(cueRay.hitBall.pos.x, cueRay.hitBall.pos.y); ctx.lineTo(tEnd.x, tEnd.y); ctx.strokeStyle = targetColor; ctx.lineWidth = 6; ctx.stroke();

                let cEnd = cueBounceRay.endPos;
                if (!showFull) { if (cEnd.sub(cueRay.endPos).mag() > 200) cEnd = cueRay.endPos.add(cueBounceRay.dir.mult(200)); }
                ctx.beginPath(); ctx.moveTo(cueRay.endPos.x, cueRay.endPos.y); ctx.lineTo(cEnd.x, cEnd.y); ctx.strokeStyle = secColor; ctx.lineWidth = 4; ctx.setLineDash([10, 10]); ctx.stroke(); ctx.setLineDash([]);
            }

            let cueDist = BALL_R * 2.5 + (gameState.aimPower / MAX_POWER) * 400;
            ctx.beginPath(); ctx.moveTo(tb.pos.x - Math.cos(gameState.aimAngle) * cueDist, tb.pos.y - Math.sin(gameState.aimAngle) * cueDist);
            ctx.lineTo(tb.pos.x - Math.cos(gameState.aimAngle) * (cueDist + 2000), tb.pos.y - Math.sin(gameState.aimAngle) * (cueDist + 2000));
            ctx.strokeStyle = '#c2410c'; ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.stroke();
            ctx.restore();
        }

        function loop() {
            drawTable();
            for (let step = 0; step < PHYSICS_STEPS; step++) updatePhysics((1.0 / 60.0) / PHYSICS_STEPS);
            ctx.save(); ctx.translate(RAIL_W, RAIL_W); balls.forEach(b => b.draw()); ctx.restore();
            drawAim(); requestAnimationFrame(loop);
        }

        // === UI УПРАВЛЕНИЕ ===
        function updateHUD() {
            const p1 = document.getElementById('player1-panel'); const p2 = document.getElementById('player2-panel');
            const n1 = document.getElementById('name1'); const n2 = document.getElementById('name2');

            if (gameState.currentPlayer === 1) {
                p1.classList.remove('opacity-50'); p2.classList.add('opacity-50');
                n1.classList.add('text-emerald-400'); n1.classList.remove('text-white');
                n2.classList.remove('text-emerald-400'); n2.classList.add('text-white');
            } else {
                p2.classList.remove('opacity-50'); p1.classList.add('opacity-50');
                n2.classList.add('text-emerald-400'); n2.classList.remove('text-white');
                n1.classList.remove('text-emerald-400'); n1.classList.add('text-white');
            }

            const renderBalls = (pocketed) => {
                let html = '';
                for(let i=0; i<8; i++) {
                    if(i < pocketed.length) {
                        let isFoul = pocketed[i] === "Ш"; let style = isFoul ? "background: #ef4444;" : "background: #fffff0;";
                        html += `<div class="ball-icon" style="${style}">${pocketed[i]}</div>`;
                    } else html += `<div class="ball-empty"></div>`;
                }
                return html;
            }
            document.getElementById('pocketed1').innerHTML = renderBalls(gameState.pocketed1);
            document.getElementById('pocketed2').innerHTML = renderBalls(gameState.pocketed2);
        }
        function setStatus(text) { document.getElementById('game-status').innerText = text; }
        
        let modalCallback = null;
        function showModal(title, desc, callback = null) {
            document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-message').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('modal-content').classList.remove('scale-95'); modalCallback = callback;
        }
        function closeModal() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('modal-message').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('modal-content').classList.add('scale-95'); if (modalCallback) modalCallback();
        }

        // Винт
        const spinCtrl = document.getElementById('spin-control'); const spinDot = document.getElementById('spin-dot'); let isSpinDragging = false;
        function updateSpin(e) {
            const rect = spinCtrl.getBoundingClientRect(); let cx = e.touches ? e.touches[0].clientX : e.clientX; let cy = e.touches ? e.touches[0].clientY : e.clientY;
            let x = cx - rect.left - rect.width / 2; let y = cy - rect.top - rect.height / 2; let r = rect.width / 2; let dist = Math.sqrt(x*x + y*y);
            if (dist > r) { x = (x / dist) * r; y = (y / dist) * r; }
            spinDot.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`; gameState.spin = new Vec2(x / r, y / r);
        }
        function resetSpin() { spinDot.style.transform = `translate(-50%, -50%)`; gameState.spin = new Vec2(0, 0); }
        spinCtrl.addEventListener('mousedown', (e) => { isSpinDragging = true; updateSpin(e); }); window.addEventListener('mousemove', (e) => { if (isSpinDragging) updateSpin(e); }); window.addEventListener('mouseup', () => { isSpinDragging = false; });
        spinCtrl.addEventListener('touchstart', (e) => { isSpinDragging = true; updateSpin(e); e.preventDefault(); }, {passive: false}); window.addEventListener('touchmove', (e) => { if (isSpinDragging) updateSpin(e); }, {passive: false}); window.addEventListener('touchend', () => { isSpinDragging = false; });

        // Сила
        const powerSlider = document.getElementById('power-slider'); const powerFill = document.getElementById('power-fill'); const powerHandle = document.getElementById('power-handle'); let isPowerDragging = false;
        function updatePowerFromSlider(e) {
            const rect = powerSlider.getBoundingClientRect(); let cy = e.touches ? e.touches[0].clientY : e.clientY;
            let percent = Math.max(0, Math.min(1, (cy - rect.top) / rect.height));
            gameState.aimPower = percent * MAX_POWER;
            let fillHeight = percent * 100; powerFill.style.height = `${fillHeight}%`; powerHandle.style.bottom = `${100 - fillHeight}%`;
        }
        function executeShot() {
            if (gameState.aimPower > 100 && !gameState.ballsMoving && gameState.selectedBall) {
                gameState.hitOccurred = false; gameState.foul = false; gameState.pocketedThisTurn = 0;
                let dir = new Vec2(Math.cos(gameState.aimAngle), Math.sin(gameState.aimAngle));
                gameState.selectedBall.vel = dir.mult(gameState.aimPower);
                gameState.selectedBall.spin = dir.mult(gameState.aimPower * -gameState.spin.y * 2.5);
                gameState.selectedBall.sideSpin = gameState.spin.x * gameState.aimPower * 0.8;
                playSound('cue', gameState.aimPower);
            }
            gameState.aimPower = 0; powerFill.style.height = `0%`; powerHandle.style.bottom = `100%`;
        }
        powerSlider.addEventListener('mousedown', (e) => { if(gameState.ballsMoving || !gameState.selectedBall) return; isPowerDragging = true; updatePowerFromSlider(e); }); window.addEventListener('mousemove', (e) => { if (isPowerDragging) updatePowerFromSlider(e); }); window.addEventListener('mouseup', () => { if (isPowerDragging) { isPowerDragging = false; executeShot(); }});
        powerSlider.addEventListener('touchstart', (e) => { if(gameState.ballsMoving || !gameState.selectedBall) return; isPowerDragging = true; updatePowerFromSlider(e); e.preventDefault(); }, {passive: false}); window.addEventListener('touchmove', (e) => { if (isPowerDragging) updatePowerFromSlider(e); }, {passive: false}); window.addEventListener('touchend', () => { if (isPowerDragging) { isPowerDragging = false; executeShot(); }});

        // МИКРО-ПРИЦЕЛ (Ruler Wheel)
        const microAimArea = document.getElementById('micro-aim-area'); const microAimRuler = document.getElementById('micro-aim-ruler');
        let microAimDragging = false; let lastMicroAimX = 0; let rulerOffset = 0;
        
        function handleMicroAimStart(e) {
            if(gameState.ballsMoving || !gameState.selectedBall) return;
            microAimDragging = true; lastMicroAimX = e.touches ? e.touches[0].clientX : e.clientX;
        }
        function handleMicroAimMove(e) {
            if (!microAimDragging) return;
            let cx = e.touches ? e.touches[0].clientX : e.clientX;
            let deltaX = cx - lastMicroAimX;
            
            // Сверхточная наводка: 1 пиксель свайпа = 0.002 радиана (доли градуса!)
            gameState.aimAngle += deltaX * 0.002;
            
            rulerOffset += deltaX;
            if (rulerOffset > 40) rulerOffset -= 40; if (rulerOffset < -40) rulerOffset += 40; // Бесконечный цикл паттерна
            microAimRuler.style.transform = `translateX(${rulerOffset}px)`;
            
            lastMicroAimX = cx;
        }
        function handleMicroAimEnd() { microAimDragging = false; }
        
        microAimArea.addEventListener('mousedown', handleMicroAimStart); window.addEventListener('mousemove', handleMicroAimMove); window.addEventListener('mouseup', handleMicroAimEnd);
        microAimArea.addEventListener('touchstart', handleMicroAimStart, {passive: false}); window.addEventListener('touchmove', handleMicroAimMove, {passive: false}); window.addEventListener('touchend', handleMicroAimEnd);

        // Стол (Выбор шара и Грубый прицел)
        function getMousePosInMM(e) {
            const rect = canvas.getBoundingClientRect();
            let cx = e.touches ? e.touches[0].clientX : e.clientX; let cy = e.touches ? e.touches[0].clientY : e.clientY;
            return new Vec2((cx - rect.left) / scale - RAIL_W, (cy - rect.top) / scale - RAIL_W);
        }
        function handleCanvasStart(e) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if (gameState.ballsMoving) return;
            let touchPos = getMousePosInMM(e);
            let clickedBall = null;
            for (let b of balls) { if (b.active && touchPos.sub(b.pos).mag() < b.radius * 2) { clickedBall = b; break; } }

            if (clickedBall) {
                gameState.selectedBall = clickedBall; setStatus("Шар выбран. Цельтесь.");
            } else if (gameState.selectedBall) {
                if (gameState.ballInHand) { gameState.isPlacingCue = true; return; } 
                else { let delta = touchPos.sub(gameState.selectedBall.pos); gameState.aimAngle = Math.atan2(delta.y, delta.x); gameState.isAimingOnCanvas = true; }
            }
        }
        function handleCanvasMove(e) {
            if (!gameState.selectedBall) return;
            let currentPos = getMousePosInMM(e);
            if (gameState.isPlacingCue) {
                currentPos.x = Math.max(BALL_R, Math.min(currentPos.x, HOUSE_X)); currentPos.y = Math.max(BALL_R, Math.min(currentPos.y, TABLE_H - BALL_R));
                let valid = true;
                for (let b of balls) { if (b !== gameState.selectedBall && b.active && currentPos.sub(b.pos).mag() < BALL_R * 2) { valid = false; break; } }
                if (valid) gameState.selectedBall.pos = currentPos; return;
            }
            if (gameState.isAimingOnCanvas) { let delta = currentPos.sub(gameState.selectedBall.pos); gameState.aimAngle = Math.atan2(delta.y, delta.x); }
        }
        function handleCanvasEnd(e) { if (gameState.isPlacingCue) { gameState.isPlacingCue = false; gameState.ballInHand = false; setStatus("Цельтесь."); } if (gameState.isAimingOnCanvas) gameState.isAimingOnCanvas = false; }

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', handleCanvasStart); window.addEventListener('mousemove', handleCanvasMove); window.addEventListener('mouseup', handleCanvasEnd);
        canvas.addEventListener('touchstart', handleCanvasStart, {passive: false}); window.addEventListener('touchmove', handleCanvasMove, {passive: false}); window.addEventListener('touchend', handleCanvasEnd);

        initGame(); loop();
    </script>
