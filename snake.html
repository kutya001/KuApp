<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Змейка</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0f;--sur:#1a1a24;--sur2:#22222f;--text:#f0f0f8;--text2:#8888aa;--g:#00e5a0;--r:#ff4466;--b:#5b8cff}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;user-select:none}
  #hdr{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:360px;padding:10px 16px 6px}
  #score-lbl{font-size:0.7rem;color:var(--text2);letter-spacing:.1em}
  #score{font-size:1.4rem;font-weight:700;color:var(--g)}
  #best{font-size:0.7rem;color:var(--text2)}
  canvas{display:block;border-radius:12px;touch-action:none}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(10,10,15,.82);backdrop-filter:blur(4px)}
  #overlay h2{font-size:1.3rem;font-weight:700}
  #overlay p{font-size:.8rem;color:var(--text2);text-align:center}
  #btn-start{background:var(--g);color:#000;border:none;padding:12px 36px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}
  #swipe-hint{position:absolute;bottom:16px;font-size:.65rem;color:var(--text2);letter-spacing:.05em}
</style>
</head>
<body>
<div id="hdr">
  <div><div id="score-lbl">ОЧКИ</div><div id="score">0</div></div>
  <div id="best">Рекорд: <span id="best-val">0</span></div>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h2>🐍 Змейка</h2>
  <p>Свайп или стрелки для управления</p>
  <button id="btn-start">Играть</button>
</div>
<div id="swipe-hint">← свайп →</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best-val');

const CELL=20;
let cols,rows,snake,dir,nextDir,food,score,best=+localStorage.getItem('snake_best')||0,running=false,raf;

function resize(){
  const W=Math.min(window.innerWidth,360);
  const H=window.innerHeight-80;
  cols=Math.floor(W/CELL); rows=Math.floor(H/CELL);
  canvas.width=cols*CELL; canvas.height=rows*CELL;
  canvas.style.width=canvas.width+'px'; canvas.style.height=canvas.height+'px';
}

function placeFood(){
  let pos;
  do{ pos={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}; }
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
}

function init(){
  resize();
  const mx=Math.floor(cols/2), my=Math.floor(rows/2);
  snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
  dir={x:1,y:0}; nextDir={x:1,y:0}; score=0; scoreEl.textContent=0;
  placeFood(); running=true; overlay.style.display='none';
  if(raf) cancelAnimationFrame(raf);
  loop();
}

let last=0;
function loop(ts=0){
  if(!running) return;
  raf=requestAnimationFrame(loop);
  if(ts-last<130) return;
  last=ts; tick();
}

function tick(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=cols||head.y<0||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver(); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++; scoreEl.textContent=score;
    if(score>best){ best=score; bestEl.textContent=best; localStorage.setItem('snake_best',best); }
    placeFood();
  } else { snake.pop(); }
  draw();
}

function draw(){
  ctx.fillStyle='#111118';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // еда
  ctx.fillStyle='#ff8c42';
  ctx.beginPath();
  ctx.roundRect(food.x*CELL+2,food.y*CELL+2,CELL-4,CELL-4,4);
  ctx.fill();
  // змейка
  snake.forEach((s,i)=>{
    const alpha=i===0?1:Math.max(0.35,1-i/snake.length*0.6);
    ctx.fillStyle=i===0?'#00e5a0':`rgba(0,229,160,${alpha})`;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,i===0?6:4);
    ctx.fill();
  });
}

function gameOver(){
  running=false;
  overlay.style.display='flex';
  overlay.querySelector('h2').textContent='💀 Игра окончена';
  overlay.querySelector('p').textContent=`Счёт: ${score}`;
}

bestEl.textContent=best;
document.getElementById('btn-start').addEventListener('click',init);

// Клавиатура
document.addEventListener('keydown',e=>{
  if(!running) return;
  if(e.key==='ArrowUp'&&dir.y===0) nextDir={x:0,y:-1};
  else if(e.key==='ArrowDown'&&dir.y===0) nextDir={x:0,y:1};
  else if(e.key==='ArrowLeft'&&dir.x===0) nextDir={x:-1,y:0};
  else if(e.key==='ArrowRight'&&dir.x===0) nextDir={x:1,y:0};
});

// Свайп
let sx,sy;
canvas.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!running) return;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20&&dir.x===0) nextDir={x:1,y:0};
    else if(dx<-20&&dir.x===0) nextDir={x:-1,y:0};
  } else {
    if(dy>20&&dir.y===0) nextDir={x:0,y:1};
    else if(dy<-20&&dir.y===0) nextDir={x:0,y:-1};
  }
},{passive:true});

window.addEventListener('resize',()=>{ if(running) init(); else resize(); });
resize();
</script>
</body>
</html>
