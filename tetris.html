<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Тетрис</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;user-select:none;font-family:'JetBrains Mono',monospace;color:#f0f0f8}
  #top{display:flex;justify-content:space-between;align-items:flex-start;width:min(92vw,320px);padding:8px 0 4px}
  .info-box{background:#1a1a24;border-radius:8px;padding:6px 12px;text-align:center;min-width:70px}
  .info-lbl{font-size:.55rem;color:#8888aa;letter-spacing:.1em}
  .info-val{font-size:1.1rem;font-weight:700}
  #wrap{display:flex;gap:8px;align-items:flex-start}
  canvas{display:block;border-radius:8px}
  #side{display:flex;flex-direction:column;gap:8px}
  .side-box{background:#1a1a24;border-radius:8px;padding:8px;text-align:center}
  .side-lbl{font-size:.55rem;color:#8888aa;letter-spacing:.08em;margin-bottom:4px}
  #next-c{display:block;margin:0 auto}
  #ctrl{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .ctrl-row{display:flex;gap:6px;justify-content:center}
  .cbtn{background:#22222f;border:1px solid rgba(255,255,255,.1);color:#f0f0f8;width:42px;height:42px;border-radius:8px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cbtn:active{background:#2d2d40}
  #overlay{position:fixed;inset:0;background:rgba(10,10,15,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;backdrop-filter:blur(4px)}
  #overlay h2{font-size:1.2rem}
  #overlay p{font-size:.75rem;color:#8888aa}
  #btn-go{background:#00e5a0;color:#000;border:none;padding:12px 36px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="top">
  <div class="info-box"><div class="info-lbl">СЧЁТ</div><div class="info-val" id="score">0</div></div>
  <div class="info-box"><div class="info-lbl">РЕКОРД</div><div class="info-val" id="best">0</div></div>
  <div class="info-box"><div class="info-lbl">УРОВЕНЬ</div><div class="info-val" id="level">1</div></div>
</div>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="side">
    <div class="side-box"><div class="side-lbl">СЛЕДУЮЩИЙ</div><canvas id="next-c" width="60" height="60"></canvas></div>
    <div class="side-box"><div class="side-lbl">ЛИНИИ</div><div class="info-val" id="lines">0</div></div>
  </div>
</div>
<div id="ctrl">
  <div class="ctrl-row"><button class="cbtn" id="cb-up">↺</button></div>
  <div class="ctrl-row">
    <button class="cbtn" id="cb-l">←</button>
    <button class="cbtn" id="cb-d">↓</button>
    <button class="cbtn" id="cb-r">→</button>
  </div>
  <div class="ctrl-row"><button class="cbtn" id="cb-drop" style="width:96px;font-size:.7rem">Дроп ↓↓</button></div>
</div>

<div id="overlay">
  <h2>🟦 Тетрис</h2>
  <p>Собирай полные линии</p>
  <button id="btn-go">Играть</button>
</div>

<script>
const COLS=10,ROWS=20;
const PIECES=[
  {s:[[1,1,1,1]],c:'#5b8cff'},            // I
  {s:[[1,1],[1,1]],c:'#ffd700'},            // O
  {s:[[0,1,0],[1,1,1]],c:'#b05bff'},       // T
  {s:[[1,0],[1,0],[1,1]],c:'#ff8c42'},     // L
  {s:[[0,1],[0,1],[1,1]],c:'#00e5a0'},     // J
  {s:[[1,1,0],[0,1,1]],c:'#ff4466'},       // S
  {s:[[0,1,1],[1,1,0]],c:'#00c8ff'},       // Z
];

let grid,cur,next,score,lines,level,running=false,raf,dropTimer,dropInterval;
let best=+localStorage.getItem('tetris_best')||0;

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const nc=document.getElementById('next-c');
const nctx=nc.getContext('2d');

let CELL;
function setup(){
  const avW=Math.min(window.innerWidth-90,200);
  CELL=Math.floor(avW/COLS);
  canvas.width=COLS*CELL; canvas.height=ROWS*CELL;
}

function randPiece(){
  const p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return { s:p.s.map(r=>[...r]), c:p.c, x:Math.floor(COLS/2)-Math.floor(p.s[0].length/2), y:0 };
}

function newGame(){
  setup();
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0; lines=0; level=1; dropInterval=600;
  document.getElementById('score').textContent=0;
  document.getElementById('lines').textContent=0;
  document.getElementById('level').textContent=1;
  document.getElementById('best').textContent=best;
  document.getElementById('overlay').style.display='none';
  cur=randPiece(); next=randPiece();
  running=true;
  if(raf) cancelAnimationFrame(raf);
  clearTimeout(dropTimer);
  scheduleDrop();
  raf=requestAnimationFrame(render);
}

function scheduleDrop(){
  clearTimeout(dropTimer);
  dropTimer=setTimeout(()=>{ if(running){ tryMove(0,1,cur); scheduleDrop(); } }, dropInterval);
}

function validPos(piece, dx=0, dy=0, s=piece.s){
  for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++){
    if(!s[r][c]) continue;
    const nx=piece.x+c+dx, ny=piece.y+r+dy;
    if(nx<0||nx>=COLS||ny>=ROWS) return false;
    if(ny>=0&&grid[ny][nx]) return false;
  }
  return true;
}

function tryMove(dx,dy,p){
  if(validPos(p,dx,dy)){ p.x+=dx; p.y+=dy; return true; }
  if(dy>0){ lock(); return false; }
  return false;
}

function rotate(){
  const s=cur.s;
  const rows=s.length, cols=s[0].length;
  const rot=Array.from({length:cols},(_,r)=>Array.from({length:rows},(_,c)=>s[rows-1-c][r]));
  if(validPos(cur,0,0,rot)) cur.s=rot;
  else if(validPos(cur,1,0,rot)){ cur.s=rot; cur.x+=1; }
  else if(validPos(cur,-1,0,rot)){ cur.s=rot; cur.x-=1; }
}

function hardDrop(){
  while(validPos(cur,0,1)) cur.y++;
  lock();
}

function lock(){
  cur.s.forEach((r,ri)=>r.forEach((v,ci)=>{
    if(v&&cur.y+ri>=0) grid[cur.y+ri][cur.x+ci]=cur.c;
  }));
  clearLines();
  cur=next; next=randPiece();
  if(!validPos(cur)){ gameOver(); return; }
  scheduleDrop();
}

function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(Boolean)){ grid.splice(r,1); grid.unshift(Array(COLS).fill(null)); cleared++; r++; }
  }
  if(!cleared) return;
  const pts=[0,100,300,500,800][Math.min(cleared,4)]*level;
  score+=pts; lines+=cleared;
  level=Math.floor(lines/10)+1;
  dropInterval=Math.max(100,600-level*50);
  document.getElementById('score').textContent=score;
  document.getElementById('lines').textContent=lines;
  document.getElementById('level').textContent=level;
  if(score>best){ best=score; localStorage.setItem('tetris_best',best); document.getElementById('best').textContent=best; }
}

function gameOver(){
  running=false; cancelAnimationFrame(raf); clearTimeout(dropTimer);
  const ov=document.getElementById('overlay');
  ov.querySelector('h2').textContent='💀 Игра окончена';
  ov.querySelector('p').textContent=`Счёт: ${score}`;
  ov.style.display='flex';
}

function render(){
  if(!running){ return; }
  raf=requestAnimationFrame(render);
  ctx.fillStyle='#111118'; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Сетка
  ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=.5;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.strokeRect(c*CELL,r*CELL,CELL,CELL);
    if(grid[r][c]){ drawBlock(ctx,c*CELL,r*CELL,grid[r][c]); }
  }

  // Тень
  let ghostY=cur.y;
  while(validPos({...cur,y:ghostY+1,s:cur.s})) ghostY++;
  cur.s.forEach((r,ri)=>r.forEach((v,ci)=>{
    if(v){ ctx.fillStyle='rgba(255,255,255,.1)'; ctx.fillRect((cur.x+ci)*CELL+1,(ghostY+ri)*CELL+1,CELL-2,CELL-2); }
  }));

  // Текущая фигура
  cur.s.forEach((r,ri)=>r.forEach((v,ci)=>{ if(v) drawBlock(ctx,(cur.x+ci)*CELL,(cur.y+ri)*CELL,cur.c); }));

  // Следующая
  nctx.fillStyle='#1a1a24'; nctx.fillRect(0,0,60,60);
  const ns=next.s, nc_size=6;
  const ox=Math.floor((5-ns[0].length)/2), oy=Math.floor((5-ns.length)/2);
  ns.forEach((r,ri)=>r.forEach((v,ci)=>{ if(v) drawBlock(nctx,(ox+ci)*nc_size,(oy+ri)*nc_size,next.c,nc_size); }));
}

function drawBlock(ctx,x,y,color,size=CELL){
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.roundRect(x+1,y+1,size-2,size-2,2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.fillRect(x+2,y+2,size-4,3);
}

// Клавиши
document.addEventListener('keydown',e=>{
  if(!running) return;
  if(e.key==='ArrowLeft'){e.preventDefault();tryMove(-1,0,cur);}
  else if(e.key==='ArrowRight'){e.preventDefault();tryMove(1,0,cur);}
  else if(e.key==='ArrowDown'){e.preventDefault();tryMove(0,1,cur);scheduleDrop();}
  else if(e.key==='ArrowUp'){e.preventDefault();rotate();}
  else if(e.key===' '){e.preventDefault();hardDrop();}
});

// Кнопки
document.getElementById('cb-l').addEventListener('click',()=>tryMove(-1,0,cur));
document.getElementById('cb-r').addEventListener('click',()=>tryMove(1,0,cur));
document.getElementById('cb-d').addEventListener('click',()=>{tryMove(0,1,cur);scheduleDrop();});
document.getElementById('cb-up').addEventListener('click',rotate);
document.getElementById('cb-drop').addEventListener('click',hardDrop);
document.getElementById('btn-go').addEventListener('click',newGame);

// Свайп
let sx,sy;
canvas.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!running) return;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)<10&&Math.abs(dy)<10){rotate();return;}
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20) tryMove(1,0,cur); else if(dx<-20) tryMove(-1,0,cur);
  } else {
    if(dy>40) hardDrop(); else if(dy<-20) rotate();
  }
},{passive:true});

document.getElementById('best').textContent=best;
setup();
</script>
</body>
</html>
